experiment_name: baseline_cnn_isic_to_ham
output_root: outputs
seed: 42
deterministic: true

data:
  isic_root: "data/ISIC 2019"
  ham_root: "data/HAM10000"
  image_size: 224
  val_size: 0.20
  batch_size: 32
  num_workers: 4
  pin_memory: true

train:
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
